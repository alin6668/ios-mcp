name: Test Checkout

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-14
    steps:
      - name: Check workspace
        run: |
          echo "HOME=$HOME"
          echo "PWD=$(pwd)"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          touch /tmp/test.txt && echo "OK: writable"

      - name: Clone repo (anonymous HTTPS)
        run: |
          git clone --depth 1 https://github.com/${{ github.repository }}.git .
          echo "Clone success!"
          git log --oneline -1
          ls Makefile && echo "Makefile found"

      - name: Setup Xcode
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Setup Theos
        run: |
          THEOS=/opt/theos
          git clone --depth 1 https://github.com/theos/theos.git $THEOS 2>&1
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p $THEOS/sdks
          ln -sf "$SDK" "$THEOS/sdks/$(basename "$SDK")"
          ls -la $THEOS/sdks/

      - name: Install tools
        run: |
          brew install ldid xz 2>&1 || true
          which ldid || echo "WARN: no ldid"

      - name: Build
        run: |
          export THEOS=/opt/theos
          export THEOS_PACKAGE_SCHEME=rootless
          make clean 2>/dev/null || true
          make FINALPACKAGE=1 DEBUG=0 STRIP=1 package 2>&1
          echo "=== Result ==="
          find . -name "*.deb" -ls 2>/dev/null || echo "No DEB found"
