name: Build iOS MCP DEB

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  THEOS: /opt/theos

jobs:
  build:
    name: Build (${{ matrix.scheme }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        scheme: [rootless, rootful]

    steps:
      - name: Clone repository
        run: |
          git clone --depth 1 https://github.com/${{ github.repository }}.git /tmp/repo
          cp -r /tmp/repo/. "$GITHUB_WORKSPACE/"
          echo "Repo cloned, commit:"
          cd "$GITHUB_WORKSPACE" && git log --oneline -1

      - name: Setup Xcode & SDK
        run: |
          xcodebuild -version 2>&1
          SDK=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)
          echo "iOS SDK: $SDK"
          if [ -z "$SDK" ] || [ ! -d "$SDK" ]; then
            echo "ERROR: iOS SDK not found!"; exit 1
          fi
          echo "SDK_PATH=$SDK" >> $GITHUB_ENV

      - name: Setup Theos
        run: |
          if [ ! -d "$THEOS/.git" ]; then
            rm -rf "$THEOS" 2>/dev/null || true
            git clone --depth 1 https://github.com/theos/theos.git "$THEOS" 2>&1
          fi
          echo "Theos: $(cd $THEOS && git rev-parse --short HEAD)"
          # Link iOS SDK
          mkdir -p "$THEOS/sdks"
          SDK_NAME=$(basename "$SDK_PATH")
          rm -f "$THEOS/sdks/$SDK_NAME"
          ln -sf "$SDK_PATH" "$THEOS/sdks/$SDK_NAME"
          echo "SDK linked: $THEOS/sdks/$SDK_NAME"
          ls -la "$THEOS/sdks/"

      - name: Install tools
        run: |
          brew install ldid xz 2>&1 || true
          which ldid || echo "WARN: ldid not found"

      - name: Fetch dependencies
        run: |
          mkdir -p "$THEOS/lib"
          # libsubstrate (from Substitute)
          echo "=== Fetching libsubstrate ==="
          if curl -fsSL --connect-timeout 15 --max-time 90 \
            -o /tmp/sub.deb "https://github.com/elihwyma/Substitute/releases/download/v2.0.4/com.ex.substitute_2.0.4_iphoneos-arm.deb" 2>/dev/null; then
            mkdir -p /tmp/subx && cd /tmp/subx
            ar x /tmp/sub.deb data.tar.* 2>/dev/null || true
            for f in data.tar.*; do tar -xf "$f" 2>/dev/null || true; done
            find . -name "libsubstitute.dylib" -exec cp {} "$THEOS/lib/libsubstrate.dylib" \; 2>/dev/null || true
            cd "$GITHUB_WORKSPACE"
          fi
          # libzip
          echo "=== Fetching libzip ==="
          if curl -fsSL --connect-timeout 15 --max-time 90 \
            -o /tmp/libzip.deb "http://apt.thebigboss.org/repofiles/cydia/debs2.0/libzip_0.11.2.deb" 2>/dev/null; then
            mkdir -p /tmp/zipx && cd /tmp/zipx
            ar x /tmp/libzip.deb data.tar.* 2>/dev/null || true
            for f in data.tar.*; do tar -xf "$f" 2>/dev/null || true; done
            find . -name "libzip.a" -exec cp {} "$THEOS/lib/libzip.a" \; 2>/dev/null || true
            cd "$GITHUB_WORKSPACE"
          fi
          echo "=== Dependencies ==="
          ls -la "$THEOS/lib/" 2>/dev/null || echo "(empty)"

      - name: Build subprojects
        run: |
          if [ "${{ matrix.scheme }}" = "rootless" ]; then
            export THEOS_PACKAGE_SCHEME=rootless
          else
            unset THEOS_PACKAGE_SCHEME
          fi
          for dir in AppSync AppSync/appinst mcp-roothelper mcp-ldid mcp-root mcp-logreader; do
            echo ">>> $dir <<<"
            [ -d "$dir" ] || { echo "SKIP"; continue; }
            pushd "$dir" > /dev/null
            make clean 2>/dev/null || true
            make 2>&1 || echo "WARN: $dir failed"
            popd > /dev/null
          done

      - name: Build package
        run: |
          if [ "${{ matrix.scheme }}" = "rootless" ]; then
            export THEOS_PACKAGE_SCHEME=rootless
          else
            unset THEOS_PACKAGE_SCHEME
          fi
          make clean 2>/dev/null || true
          make FINALPACKAGE=1 DEBUG=0 STRIP=1 package 2>&1
          echo "=== Result ==="
          find . -name "*.deb" -ls 2>/dev/null || echo "No DEB found"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-mcp-${{ matrix.scheme }}
          path: packages/*.deb
          retention-days: 90
          if-no-files-found: warn

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*.deb
          generate_release_notes: true
          name: "iOS MCP ${{ github.ref_name }} (${{ matrix.scheme }})"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
