name: Test Checkout

on:
  push:
    branches: [main]

jobs:
  test-checkout:
    runs-on: macos-14
    steps:
      - name: Manual clone
        run: |
          echo "=== Cloning ==="
          git clone --depth 1 "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" .
          echo "=== Clone done ==="
          git log --oneline -1
          ls -la

      - name: Env check
        run: |
          echo "=== Xcode ==="
          xcodebuild -version
          echo "=== SDK ==="
          xcrun --sdk iphoneos --show-sdk-path

      - name: Install Theos
        run: |
          THEOS=/opt/theos
          git clone --depth 1 https://github.com/theos/theos.git $THEOS
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p $THEOS/sdks
          ln -sf "$SDK" "$THEOS/sdks/$(basename "$SDK")"
          ls -la $THEOS/sdks/

      - name: Install tools
        run: |
          brew install ldid xz || true
          which ldid

      - name: Build test
        run: |
          export THEOS=/opt/theos
          export THEOS_PACKAGE_SCHEME=rootless
          make clean 2>/dev/null || true
          make FINALPACKAGE=1 DEBUG=0 STRIP=1 package 2>&1
          find . -name "*.deb" -ls
