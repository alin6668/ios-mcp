name: Build iOS MCP DEB

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      scheme:
        description: '构建方案'
        required: false
        default: 'rootless'
        type: choice
        options: ['rootful', 'rootless', 'roothide']

env:
  PACKAGE_NAME: com.witchan.ios-mcp
  VERSION: 1.2.1

jobs:
  build-rootless:
    name: Build Rootless DEB (arm64+arm64e)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.0.app 2>/dev/null || \
          echo "Using default Xcode"
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Install Theos
        run: |
          export THEOS=/opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          if [ -d "$THEOS" ]; then
            echo "Theos already installed"
          else
            echo "Installing Theos..."
            git clone --depth 1 https://github.com/theos/theos.git $THEOS
          fi
          echo "Theos installed at: $THEOS"
          ls $THEOS/makefiles/common.mk && echo "Theos OK"

      - name: Install build tools
        run: |
          brew install ldid dpkg make 2>/dev/null || true
          which ldid
          which dpkg-deb

      - name: Build subprojects (rootless)
        run: |
          export THEOS=/opt/theos
          export THEOS_PACKAGE_SCHEME=rootless
          echo "=== Building AppSync ==="
          cd AppSync && make clean >/dev/null 2>&1 || true
          make ${{ env.MAKE_ARGS }} || echo "AppSync build had issues, continuing..."
          cd ..
          echo "=== Building AppSync/appinst ==="
          cd AppSync/appinst && make clean >/dev/null 2>&1 || true
          make ${{ env.MAKE_ARGS }} || echo "appinst build had issues, continuing..."
          cd ../..
          for subproject in mcp-roothelper mcp-ldid mcp-root mcp-logreader; do
            echo "=== Building ${subproject} ==="
            cd ${subproject} && make clean >/dev/null 2>&1 || true
            make ${{ env.MAKE_ARGS }} || echo "${subproject} build had issues, continuing..."
            cd ..
          done

      - name: Build ios-mcp package (rootless)
        run: |
          export THEOS=/opt/theos
          export THEOS_PACKAGE_SCHEME=rootless
          echo "=== Building ios-mcp (rootless) ==="
          make clean >/dev/null 2>&1 || true
          make FINALPACKAGE=1 DEBUG=0 STRIP=1 package
          echo "=== Build complete ==="
          ls -la packages/ 2>/dev/null || echo "No packages/ directory"

      - name: Find and upload DEB
        run: |
          DEB_FILE=$(find packages -maxdepth 1 -name "*.deb" | head -1)
          if [ -z "$DEB_FILE" ]; then
            DEB_FILE=$(find . -maxdepth 3 -name "com.witchan.ios-mcp*.deb" | head -1)
          fi
          if [ -z "$DEB_FILE" ]; then
            echo "ERROR: No DEB found!"
            find . -name "*.deb" 2>/dev/null || true
            exit 1
          fi
          echo "DEB: $DEB_FILE"
          ls -lh "$DEB_FILE"
          echo "DEB_FILE=$DEB_FILE" >> $GITHUB_ENV
          echo "DEB_NAME=$(basename "$DEB_FILE")" >> $GITHUB_ENV

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-mcp-rootless-${{ github.sha }}
          path: ${{ env.DEB_FILE }}
          retention-days: 90
          compression-level: 0

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DEB_FILE }}
          generate_release_notes: true
          name: "iOS MCP v${{ github.ref_name }} (Rootless)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-rootful:
    name: Build Rootful DEB (arm64+arm64e)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.0.app 2>/dev/null || \
          echo "Using default Xcode"
          xcodebuild -version

      - name: Install Theos
        run: |
          export THEOS=/opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          if [ ! -d "$THEOS" ]; then
            git clone --depth 1 https://github.com/theos/theos.git $THEOS
          fi

      - name: Install build tools
        run: |
          brew install ldid dpkg make 2>/dev/null || true

      - name: Build subprojects (rootful)
        run: |
          export THEOS=/opt/theos
          unset THEOS_PACKAGE_SCHEME
          cd AppSync && make clean >/dev/null 2>&1 || true
          make || echo "AppSync build had issues, continuing..."
          cd ../AppSync/appinst && make clean >/dev/null 2>&1 || true
          make || echo "appinst build had issues, continuing..."
          cd ../..
          for subproject in mcp-roothelper mcp-ldid mcp-root mcp-logreader; do
            cd ${subproject} && make clean >/dev/null 2>&1 || true
            make || echo "${subproject} build had issues, continuing..."
            cd ..
          done

      - name: Build ios-mcp package (rootful)
        run: |
          export THEOS=/opt/theos
          unset THEOS_PACKAGE_SCHEME
          make clean >/dev/null 2>&1 || true
          make FINALPACKAGE=1 DEBUG=0 STRIP=1 package
          find . -name "*.deb" -ls

      - name: Find and upload DEB
        run: |
          DEB_FILE=$(find packages -maxdepth 1 -name "*.deb" | head -1)
          if [ -z "$DEB_FILE" ]; then
            DEB_FILE=$(find . -maxdepth 3 -name "com.witchan.ios-mcp*.deb" | head -1)
          fi
          if [ -z "$DEB_FILE" ]; then
            echo "ERROR: No DEB found!"
            exit 1
          fi
          echo "DEB: $DEB_FILE"
          ls -lh "$DEB_FILE"
          echo "DEB_FILE=$DEB_FILE" >> $GITHUB_ENV

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-mcp-rootful-${{ github.sha }}
          path: ${{ env.DEB_FILE }}
          retention-days: 90
          compression-level: 0

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DEB_FILE }}
          generate_release_notes: true
          name: "iOS MCP v${{ github.ref_name }} (Rootful)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
