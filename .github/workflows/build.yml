name: Debug Git

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  debug:
    runs-on: macos-14
    steps:
      - name: Basic test
        run: |
          echo "Hello from runner"
          uname -a
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          pwd
          ls -la

      - name: Test DNS + TCP
        run: |
          echo "=== DNS test ==="
          nslookup github.com 2>&1 || true
          echo "=== TCP test ==="
          curl -sI https://github.com 2>&1 | head -5 || true
          echo "=== Git version ==="
          git --version

      - name: Test git ls-remote (anonymous)
        run: |
          echo "Testing anonymous git access..."
          GIT_CURL_VERBOSE=1 GIT_TRACE=1 git ls-remote --heads https://github.com/${{ github.repository }}.git 2>&1

      - name: Test git clone (anonymous)
        run: |
          echo "Cloning..."
          GIT_CURL_VERBOSE=1 git clone --depth 1 https://github.com/${{ github.repository }}.git /tmp/test-clone 2>&1
          ls /tmp/test-clone/Makefile && echo "SUCCESS!"
